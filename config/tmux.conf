# vim: fdm=marker
#
# QUICK TUTORIAL ON THESE MAPPINGS
#
# All commands begin with C-a (i.e., ctrl-a).
# All the mappings you will need:
#
#   C-a n    New tab (called a "window" in tmux)
#   C-a c    Close the current tab
#   C-a m    Move the current tab
#   C-a r    Rename the current tab
#
#   C-a v    Vertical split
#   C-a s    Horizontal split
#
#   C-a h    Move left one split (called a "pane" in tmux)
#   C-a l    Move right one split
#   C-a j    Move up one split
#   C-a k    Move down one split
#
#   C-a C-h  Move left one tab
#   C-a C-l  Move right one tab
#
#   C-a C-a  Move to last tab
#
# There are more mappings (read the rest of the file)
#

# Settings {{{

# default shell: use zsh from $SHELL or PATH (works on both macOS and Linux)
run-shell 'tmux set -g default-shell "$(command -v zsh || echo /bin/zsh)"'

# basic settings
set-window-option -g xterm-keys on # for vim
set-window-option -g mode-keys vi # vi key

# 256 colors + true color support
set -g default-terminal "screen-256color"
set -as terminal-features ',xterm-256color:RGB'

# Start numbering windows at 1
set -g base-index 1

# More history
set -g history-limit 10000

# This is necessary for vim to work properly
set-option -sg escape-time 0

# Rename windows
setw -g automatic-rename on

# Monitor activity, but without a big status message
setw -g monitor-activity on
set -g visual-activity off

# Better resizing
setw -g aggressive-resize on

# Show messages for slightly longer
set-option -g display-time 1000

# Sane scrolling
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# }}}

# Keybindings {{{

# vim bindings
setw -g mode-keys vi
setw -g status-keys vi

# copy-mode (tmux 2.4+ syntax)
bind Escape copy-mode                                              # Esc -- toggle copy-mode
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi v send-keys -X begin-selection           # v   -- visual selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel # y   -- yank to tmux clipboard
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle          # r   -- toggle rectangular mode
bind p   paste-buffer                  # paste from tmux clipboard
bind C-p paste-buffer

# tmux clipboard --> system clipboard (OS-aware)
if-shell "uname | grep -q Darwin" \
	"bind   y run 'tmux show-buffer | pbcopy'; bind C-y run 'tmux show-buffer | pbcopy'" \
	"bind   y run 'tmux show-buffer | xclip -i'; bind C-y run 'tmux show-buffer | xclip -i'"

# Use C-a instead of C-b
unbind C-a
unbind C-b
set -g prefix C-a
bind-key a send-prefix

# Navigate panes with hjkl (no ctrl)
bind h   select-pane -L
bind j   select-pane -D
bind k   select-pane -U
bind l   select-pane -R

# Navigate windows with ctrl-hl
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Alias: also navigate panes with ctrl-jk (to match vim)
bind -r C-j select-pane -D
bind -r C-k select-pane -U

# Vim-style mappings -- n new, c close, v vert-split, s horiz-split
# Also don't require that you let go of ctrl
bind c   confirm-before "kill-pane"
bind C-c confirm-before "kill-pane"
bind n   new-window -c "#{pane_current_path}"
bind C-n new-window -c "#{pane_current_path}"
bind v   split-window -h -c "#{pane_current_path}"
bind C-v split-window -h -c "#{pane_current_path}"
bind s   split-window -c "#{pane_current_path}"
bind C-s split-window -c "#{pane_current_path}"

# Even vertical split
bind e   select-layout even-vertical
bind C-e select-layout even-vertical

# Reload config file
bind g   source-file ~/.tmux.conf\; display "reloaded ~/.tmux.conf"

# Rename current window -- note: doesn't work with automatic rename
bind r   command-prompt -p "rename window to:" "rename-window '%%'"
bind C-r command-prompt -p "rename window to:" "rename-window '%%'"

# Switch to last active window
bind C-a last-window

# Move current window to Top position
bind t   swap-window -t 1
bind C-t swap-window -t 1

# Move window to position
bind m   command-prompt -p "move window to:"  "swap-window -t '%%'"
bind C-m command-prompt -p "move window to:"  "swap-window -t '%%'"

# Mouse interaction
set -g mouse on

# Confirm before detatch
bind d   confirm-before "detach"
bind C-d confirm-before "detach"

# }}}

# status bar {{{
# Toggle light/dark: touch ~/.term-light (light) / rm ~/.term-light (dark)
# Then reload with C-a g.  This flag is shared with vim.

set -g window-status-activity-style bold

# Dark theme (default)
set -g status-style bg=black
set -g window-status-style bg=black
set -g window-status-current-style bg=black
set-window-option -g window-status-current-format '#[fg=yellow][#I]#[fg=yellow] #W'
set-window-option -g window-status-format '#[fg=brightgreen][#I]#[fg=brightgreen] #W'
set -g status-left ''
set -g status-right '#[fg=green,bold]#(whoami)#[fg=blue,bold]@#[fg=cyan,bold]#h'

# Light theme (override if ~/.term-light exists)
if-shell "test -f ~/.term-light" {
	set -g status-style bg=white
	set -g window-status-style bg=white
	set -g window-status-current-style bg=white
	set-window-option -g window-status-current-format '#[fg=colour136][#I]#[fg=colour136] #W'
	set-window-option -g window-status-format '#[fg=colour33][#I]#[fg=colour33] #W'
	set -g status-left ''
	set -g status-right '#[fg=colour64,bold]#(whoami)#[fg=colour33,bold]@#[fg=colour37,bold]#h'
}

# }}}
